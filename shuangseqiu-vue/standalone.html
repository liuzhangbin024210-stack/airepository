<!DOCTYPE html>
<!-- 根元素：页面语言为简体中文；上一行为 HTML5 文档类型声明 -->
<html lang="zh-CN">
  <!-- 文档元数据与外部资源 -->
  <head>
    <!-- 指定 UTF-8 编码，避免中文乱码 -->
    <meta charset="UTF-8" />
    <!-- 移动端视口，适配不同屏幕宽度 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- 浏览器标签页标题 -->
    <title>双色球号码生成</title>
    <!-- 通过 CDN 引入 Vue 3 全局构建（生产版） -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <!-- 页面内联样式 -->
    <style>
      /* 根伪类：全局字体、文字色、背景渐变、最小高度 */
      :root {
        /* 无衬线字体栈，跨平台显示一致 */
        font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
        /* 主文字颜色 */
        color: #1a1a1a;
        /* 页面背景为三色线性渐变 */
        background: linear-gradient(160deg, #fff8f0 0%, #ffe8dc 45%, #f0f4ff 100%);
        /* 至少占满一屏高度 */
        min-height: 100%;
      }
      /* body：去掉默认外边距，占满视口高度 */
      body {
        /* 清除浏览器默认 body 外边距 */
        margin: 0;
        /* 最小高度为视口高度，保证背景铺满 */
        min-height: 100vh;
      }
      /* Vue 挂载根节点：垂直水平居中主内容 */
      #app {
        /* 与 body 一致，保证 flex 容器有足够高度 */
        min-height: 100vh;
        /* 使用弹性布局 */
        display: flex;
        /* 交叉轴居中（垂直方向） */
        align-items: center;
        /* 主轴居中（水平方向） */
        justify-content: center;
        /* 内边距，避免贴边 */
        padding: 24px 16px;
      }
      /* 内容区容器：限制最大宽度 */
      .page {
        /* 宽度占满父级（在 max-width 内） */
        width: 100%;
        /* 最大宽度，大屏上阅读更舒适 */
        max-width: 520px;
      }
      /* 页头区域：标题与按钮区 */
      .header {
        /* 文字居中 */
        text-align: center;
        /* 与下方列表的间距 */
        margin-bottom: 28px;
      }
      /* 主标题样式 */
      .title {
        /* 上右下左外边距，仅底部留隙 */
        margin: 0 0 8px;
        /* 标题字号 */
        font-size: 1.5rem;
        /* 字重加粗 */
        font-weight: 700;
        /* 字间距微调 */
        letter-spacing: 0.02em;
      }
      /* 规则说明小字 */
      .hint {
        /* 外边距，底部与按钮分隔 */
        margin: 0 0 20px;
        /* 辅助文字略小 */
        font-size: 0.875rem;
        /* 次要文字灰色 */
        color: #5c5c5c;
      }
      /* 主操作按钮 */
      .btn {
        /* 鼠标悬停为手型 */
        cursor: pointer;
        /* 去掉默认边框 */
        border: none;
        /* 大圆角胶囊形 */
        border-radius: 999px;
        /* 按钮内边距 */
        padding: 12px 28px;
        /* 按钮文字大小 */
        font-size: 1rem;
        /* 按钮文字加粗 */
        font-weight: 600;
        /* 按钮文字白色 */
        color: #fff;
        /* 红色渐变背景 */
        background: linear-gradient(135deg, #e63946 0%, #c1121f 100%);
        /* 红色投影增强层次 */
        box-shadow: 0 8px 24px rgba(193, 18, 31, 0.35);
        /* 悬停/按下时的过渡动画 */
        transition: transform 0.15s ease, box-shadow 0.15s ease;
      }
      /* 按钮悬停态 */
      .btn:hover {
        /* 轻微上移 */
        transform: translateY(-1px);
        /* 阴影略加深 */
        box-shadow: 0 10px 28px rgba(193, 18, 31, 0.42);
      }
      /* 按钮按下态 */
      .btn:active {
        /* 取消上移，模拟按下 */
        transform: translateY(0);
      }
      /* 号码列表：无项目符号的纵向列表 */
      .list {
        /* 去除 ul 默认圆点 */
        list-style: none;
        /* 清除 ul 默认外边距 */
        margin: 0;
        /* 清除 ul 默认内边距 */
        padding: 0;
        /* 纵向 flex 排列每一行 */
        display: flex;
        /* 主轴为纵向 */
        flex-direction: column;
        /* 各行之间的间距 */
        gap: 14px;
      }
      /* 单行号码卡片 */
      .row {
        /* 行内 flex：序号 + 球号 */
        display: flex;
        /* 垂直居中对齐 */
        align-items: center;
        /* 子元素间距 */
        gap: 12px;
        /* 卡片内边距 */
        padding: 14px 16px;
        /* 半透明白底 */
        background: rgba(255, 255, 255, 0.85);
        /* 圆角矩形 */
        border-radius: 14px;
        /* 浅阴影 */
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
        /* 背景模糊（毛玻璃感） */
        backdrop-filter: blur(8px);
      }
      /* 行序号标签 */
      .idx {
        /* 不被压缩，固定宽度方块 */
        flex-shrink: 0;
        /* 序号区域宽度 */
        width: 28px;
        /* 序号区域高度 */
        height: 28px;
        /* 内部 flex 居中数字 */
        display: flex;
        /* 垂直居中 */
        align-items: center;
        /* 水平居中 */
        justify-content: center;
        /* 序号字号 */
        font-size: 0.8rem;
        /* 序号加粗 */
        font-weight: 700;
        /* 序号文字灰 */
        color: #888;
        /* 浅灰背景 */
        background: #f3f3f3;
        /* 小圆角 */
        border-radius: 8px;
      }
      /* 一行内所有球的容器 */
      .balls {
        /* 横向排列，空间不足可换行 */
        display: flex;
        /* 允许换行 */
        flex-wrap: wrap;
        /* 垂直居中 */
        align-items: center;
        /* 球之间的间距 */
        gap: 8px;
      }
      /* 单个圆形球号（红或蓝共用基础样式） */
      .ball {
        /* 行内 flex 圆内居中数字 */
        display: inline-flex;
        /* 垂直居中 */
        align-items: center;
        /* 水平居中 */
        justify-content: center;
        /* 球直径 */
        width: 36px;
        /* 球直径 */
        height: 36px;
        /* 正圆 */
        border-radius: 50%;
        /* 球内数字字号 */
        font-size: 0.85rem;
        /* 数字加粗 */
        font-weight: 700;
        /* 数字白色 */
        color: #fff;
      }
      /* 红球配色 */
      .ball.red {
        /* 红色径向渐变模拟球体高光 */
        background: radial-gradient(circle at 30% 30%, #ff6b6b, #c1121f);
        /* 内阴影增加立体感 */
        box-shadow: inset 0 -2px 6px rgba(0, 0, 0, 0.2);
      }
      /* 蓝球配色 */
      .ball.blue {
        /* 蓝色径向渐变 */
        background: radial-gradient(circle at 30% 30%, #4cc9f0, #0077b6);
        /* 内阴影 */
        box-shadow: inset 0 -2px 6px rgba(0, 0, 0, 0.2);
      }
      /* 红球与蓝球之间的加号 */
      .sep {
        /* 加号加粗 */
        font-weight: 700;
        /* 加号灰色 */
        color: #999;
        /* 加号两侧留白 */
        padding: 0 2px;
      }
    </style>
  </head>
  <!-- 页面可见内容 -->
  <body>
    <!-- Vue 应用挂载点 -->
    <div id="app">
      <!-- 主内容宽度容器 -->
      <div class="page">
        <!-- 标题与说明、按钮 -->
        <header class="header">
          <!-- 页面主标题 -->
          <h1 class="title">双色球号码生成</h1>
          <!-- 玩法规则说明 -->
          <p class="hint">红球 6 个（01–33 不重复），蓝球 1 个（01–16）</p>
          <!-- 点击调用 generate 生成 5 组号码 -->
          <button type="button" class="btn" @click="generate">一键生成 5 组</button>
        </header>
        <!-- 有数据时才渲染列表 -->
        <ul class="list" v-if="rows.length">
          <!-- 遍历每一组号码 -->
          <li v-for="(row, idx) in rows" :key="idx" class="row">
            <!-- 显示组号 1～5 -->
            <span class="idx">{{ idx + 1 }}</span>
            <!-- 本组红球与蓝球 -->
            <span class="balls">
              <!-- 遍历当前组 6 个红球 -->
              <span v-for="r in row.reds" :key="r" class="ball red">{{ pad2(r) }}</span>
              <!-- 分隔符 -->
              <span class="sep">+</span>
              <!-- 当前组蓝球 -->
              <span class="ball blue">{{ pad2(row.blue) }}</span>
            </span>
          </li>
        </ul>
      </div>
    </div>
    <!-- 应用逻辑脚本 -->
    <script>
      // 从 Vue 全局对象解构出创建应用与响应式 ref
      const { createApp, ref } = Vue;

      // 将小于 10 的数字格式化为两位字符串（如 3 -> "03"）
      function pad2(n) {
        // 小于 10 前补零，否则直接转字符串
        return n < 10 ? "0" + n : String(n);
      }

      // 随机生成 6 个不重复红球并升序排列
      function pickReds() {
        // 生成 1～33 的号码池数组
        const pool = Array.from({ length: 33 }, (_, i) => i + 1);
        // Fisher–Yates 洗牌：从后往前随机交换
        for (let i = pool.length - 1; i > 0; i--) {
          // 在 [0, i] 范围内随机下标
          const j = Math.floor(Math.random() * (i + 1));
          // 交换 pool[i] 与 pool[j]
          [pool[i], pool[j]] = [pool[j], pool[i]];
        }
        // 取洗牌后前 6 个作为红球，再按数值升序排序
        return pool.slice(0, 6).sort((a, b) => a - b);
      }

      // 随机生成 1 个蓝球（1～16）
      function pickBlue() {
        // random 为 [0,1)，乘 16 取整后 +1 得到 1～16
        return Math.floor(Math.random() * 16) + 1;
      }

      // 创建 Vue 应用实例
      createApp({
        // 组合式 API 入口
        setup() {
          // 存储多组号码，初始为空（首次不自动生成）
          const rows = ref([]);
          // 点击按钮：生成 5 组新号码并写入 rows
          function generate() {
            // 本次生成的临时数组
            const next = [];
            // 循环 5 次，每组独立随机红球与蓝球
            for (let i = 0; i < 5; i++) {
              // 推入一组 { reds, blue }
              next.push({ reds: pickReds(), blue: pickBlue() });
            }
            // 更新响应式数据，触发界面重绘
            rows.value = next;
          }
          // 暴露给模板的属性与方法
          return { rows, pad2, generate };
        },
        // 挂载到 id 为 app 的 DOM 节点
      }).mount("#app");
    </script>
  </body>
</html>
