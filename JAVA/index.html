<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Java 类名翻译器</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "Microsoft YaHei", Arial, sans-serif;
      background: linear-gradient(135deg, #eef2ff, #f8fafc);
      color: #1f2937;
    }

    .container {
      width: min(720px, calc(100% - 32px));
      padding: 32px;
      border-radius: 20px;
      background: #ffffff;
      box-shadow: 0 20px 60px rgba(15, 23, 42, 0.12);
    }

    h1 {
      margin: 0 0 12px;
      font-size: 30px;
      color: #111827;
    }

    .description {
      margin: 0 0 28px;
      line-height: 1.7;
      color: #6b7280;
    }

    label {
      display: block;
      margin-bottom: 10px;
      font-weight: 700;
    }

    textarea {
      width: 100%;
      min-height: 120px;
      padding: 14px 16px;
      border: 1px solid #d1d5db;
      border-radius: 12px;
      resize: vertical;
      font-size: 18px;
      line-height: 1.6;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    textarea:focus {
      border-color: #4f46e5;
      box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.12);
    }

    .actions {
      display: flex;
      gap: 12px;
      margin: 18px 0 24px;
      flex-wrap: wrap;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 12px 22px;
      cursor: pointer;
      font-size: 16px;
      font-weight: 700;
      transition: transform 0.2s, box-shadow 0.2s, background 0.2s;
    }

    button:hover {
      transform: translateY(-1px);
    }

    .primary {
      background: #4f46e5;
      color: #ffffff;
      box-shadow: 0 10px 24px rgba(79, 70, 229, 0.28);
    }

    .secondary {
      background: #eef2ff;
      color: #4338ca;
    }

    .result-card {
      padding: 20px;
      border-radius: 16px;
      background: #f9fafb;
      border: 1px solid #e5e7eb;
    }

    .result-title {
      margin: 0 0 10px;
      color: #6b7280;
      font-size: 14px;
      font-weight: 700;
    }

    .result {
      min-height: 40px;
      margin: 0;
      word-break: break-all;
      font-family: Consolas, "Courier New", monospace;
      font-size: 28px;
      font-weight: 700;
      color: #047857;
    }

    .error {
      color: #dc2626;
    }

    .tips {
      margin: 18px 0 0;
      color: #6b7280;
      font-size: 14px;
      line-height: 1.7;
    }
  </style>
</head>
<body>
  <main class="container">
    <h1>Java 类名翻译器</h1>
    <p class="description">输入中文文件名或业务名称，页面会先在线翻译为英文，再生成符合阿里巴巴 Java 命名规范的 UpperCamelCase 类名。</p>

    <label for="chineseName">中文名称</label>
    <textarea id="chineseName" placeholder="例如：用户订单"></textarea>

    <div class="actions">
      <button class="primary" type="button" id="translateButton">生成类名</button>
      <button class="secondary" type="button" id="clearButton">清空</button>
    </div>

    <section class="result-card" aria-live="polite">
      <p class="result-title">英文类名</p>
      <p class="result" id="result">UserOrder</p>
    </section>

    <p class="tips">规则：不使用本地有限中文词典；中文会通过在线翻译接口转换为英文，再移除连接词、所有格、常见复数，并把常见英文词压缩为 3 到 5 个字母后生成 UpperCamelCase 类名。</p>
  </main>

  <script>
    const translateApiUrl = "https://api.mymemory.translated.net/get";
    const classNameStopWords = new Set([
      "a", "an", "and", "at", "by", "for", "from", "in", "into", "of", "on", "or", "the", "to", "with"
    ]);
    const commonAbbreviations = new Map([
      ["account", "Acct"],
      ["accounting", "Acct"],
      ["application", "App"],
      ["amount", "Amt"],
      ["asset", "Ast"],
      ["audit", "Aud"],
      ["balance", "Bal"],
      ["bank", "Bank"],
      ["bill", "Bill"],
      ["budget", "Bdgt"],
      ["business", "Biz"],
      ["capital", "Cap"],
      ["cash", "Cash"],
      ["collateral", "Coll"],
      ["configuration", "Cfg"],
      ["controller", "Ctrl"],
      ["cost", "Cost"],
      ["credit", "Crdt"],
      ["creditor", "Cred"],
      ["customer", "Cust"],
      ["debit", "Deb"],
      ["debt", "Deb"],
      ["debtor", "Debtr"],
      ["deposit", "Dep"],
      ["document", "Doc"],
      ["equity", "Eqty"],
      ["expense", "Exp"],
      ["fee", "Fee"],
      ["finance", "Fin"],
      ["financial", "Fin"],
      ["fund", "Fund"],
      ["information", "Info"],
      ["income", "Inc"],
      ["interest", "Int"],
      ["inventory", "Inv"],
      ["invoice", "Invc"],
      ["journal", "Jrnl"],
      ["ledger", "Ledg"],
      ["liability", "Liab"],
      ["loan", "Loan"],
      ["loss", "Loss"],
      ["management", "Mgmt"],
      ["message", "Msg"],
      ["number", "Num"],
      ["order", "Ord"],
      ["payable", "Payb"],
      ["payment", "Pay"],
      ["principal", "Prin"],
      ["product", "Prod"],
      ["profit", "Prof"],
      ["receivable", "Recv"],
      ["receipt", "Rcpt"],
      ["reconcile", "Recon"],
      ["reconciliation", "Recon"],
      ["refund", "Rfnd"],
      ["request", "Req"],
      ["response", "Resp"],
      ["revenue", "Rev"],
      ["right", "Rght"],
      ["settlement", "Setl"],
      ["service", "Svc"],
      ["system", "Sys"],
      ["tax", "Tax"],
      ["transfer", "Trans"],
      ["transaction", "Txn"],
      ["user", "Usr"],
      ["validation", "Valid"],
      ["voucher", "Vchr"],
      ["withdrawal", "Wdrw"]
    ]);
    const input = document.querySelector("#chineseName");
    const result = document.querySelector("#result");
    const translateButton = document.querySelector("#translateButton");
    const clearButton = document.querySelector("#clearButton");
    let latestRequestId = 0;

    /**
     * 将中文名称在线翻译成英文。
     *
     * @param {string} chineseName - 中文名称。
     * @returns {Promise<string>} 英文翻译结果。
     */
    async function translateChineseToEnglish(chineseName) {
      if (!chineseName || chineseName.trim().length === 0) {
        throw new Error("请输入中文名称");
      }

      const url = `${translateApiUrl}?q=${encodeURIComponent(chineseName.trim())}&langpair=zh-CN|en`;
      const response = await fetch(url);
      if (!response.ok) {
        throw new Error(`翻译服务请求失败：${response.status}`);
      }
      const data = await response.json();
      const translatedText = data?.responseData?.translatedText?.trim();
      if (!translatedText) {
        throw new Error("翻译服务未返回有效英文结果");
      }
      return decodeHtmlEntities(translatedText);
    }

    /**
     * 将英文翻译结果转换为 Java 类名。
     *
     * @param {string} englishName - 英文翻译结果。
     * @returns {string} UpperCamelCase 类名。
     */
    function convertEnglishToClassName(englishName) {
      const words = englishName
        .replace(/'s\b/gi, "")
        .replace(/[^A-Za-z0-9]+/g, " ")
        .trim()
        .split(/\s+/)
        .map(singularizeEnglishWord)
        .map(abbreviateCommonWord)
        .filter((word) => word && !classNameStopWords.has(word.toLowerCase()));
      let className = words.map(toUpperCamelWord).join("");
      if (className.length === 0) {
        throw new Error("翻译结果中没有可用于生成类名的英文字符");
      }
      if (!/^[A-Za-z_$]/.test(className)) {
        className = `Class${className}`;
      }
      return className;
    }

    /**
     * 将英文片段转换成 UpperCamelCase 的一个单词。
     *
     * @param {string} word - 原始英文片段。
     * @returns {string} 类名片段。
     */
    function toUpperCamelWord(word) {
      const normalized = String(word || "").replace(/[^A-Za-z0-9]/g, "");
      if (normalized.length === 0) {
        return "";
      }
      if (normalized === normalized.toUpperCase()) {
        return normalized;
      }
      return normalized.slice(0, 1).toUpperCase() + normalized.slice(1).toLowerCase();
    }

    /**
     * 解码翻译接口可能返回的 HTML 实体。
     *
     * @param {string} text - 原始文本。
     * @returns {string} 解码后的文本。
     */
    function decodeHtmlEntities(text) {
      const textarea = document.createElement("textarea");
      textarea.innerHTML = text;
      return textarea.value;
    }

    /**
     * 将常见英文复数词压缩为单数，让类名更精炼。
     *
     * @param {string} word - 英文单词。
     * @returns {string} 精炼后的英文单词。
     */
    function singularizeEnglishWord(word) {
      if (!word || word.length <= 3 || /\d/.test(word)) {
        return word;
      }

      const lowerWord = word.toLowerCase();
      if (lowerWord.endsWith("ies") && word.length > 4) {
        return `${word.slice(0, -3)}y`;
      }
      if (lowerWord.endsWith("sses") || lowerWord.endsWith("uses")) {
        return word;
      }
      if (
        lowerWord.endsWith("ches")
        || lowerWord.endsWith("shes")
        || lowerWord.endsWith("xes")
        || lowerWord.endsWith("zes")
      ) {
        return word.slice(0, -2);
      }
      if (lowerWord.endsWith("s") && !lowerWord.endsWith("ss")) {
        return word.slice(0, -1);
      }
      return word;
    }

    /**
     * 将常见英文单词替换为 3 到 5 个字母的缩写。
     *
     * @param {string} word - 英文单词。
     * @returns {string} 缩写后的单词。
     */
    function abbreviateCommonWord(word) {
      if (!word) {
        return word;
      }
      return commonAbbreviations.get(word.toLowerCase()) || word;
    }

    /**
     * 刷新页面展示结果。
     */
    async function renderResult() {
      const requestId = ++latestRequestId;
      try {
        result.textContent = "翻译中...";
        result.classList.remove("error");
        const englishName = await translateChineseToEnglish(input.value);
        if (requestId !== latestRequestId) {
          return;
        }
        result.textContent = convertEnglishToClassName(englishName);
      } catch (error) {
        if (requestId !== latestRequestId) {
          return;
        }
        result.textContent = error.message;
        result.classList.add("error");
      }
    }

    translateButton.addEventListener("click", renderResult);
    input.addEventListener("input", () => {
      clearTimeout(input.renderTimer);
      input.renderTimer = setTimeout(renderResult, 500);
    });
    clearButton.addEventListener("click", () => {
      input.value = "";
      result.textContent = "UserOrder";
      result.classList.remove("error");
      input.focus();
    });

    input.value = "用户订单";
    renderResult();
  </script>
</body>
</html>
