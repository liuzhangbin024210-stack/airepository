# 在 Linux 上安装 TensorFlow CPU 并训练导出 tiles-v1.tflite，避免本机 Windows pip 下载过慢/失败。
# 触发：手动 workflow_dispatch（可指定数据目录与 epoch），或改动牌面训练相关脚本时。
name: train-tiles-tflite

on:
  workflow_dispatch:
    inputs:
      data_dir:
        description: "牌面数据集根目录（须含 00..26 或 0..26）；留空则用 datasets/tile_crops_camerash_v1"
        required: false
        default: "datasets/tile_crops_camerash_v1"
        type: string
      epochs:
        description: "训练轮数（真实数据建议 20~50；无数据时走合成占位）"
        required: false
        default: "30"
        type: string
  push:
    paths:
      - "tools/ml/train_tile_classifier_v1.py"
      - "tools/ml/tile_schema_v1.py"
      - "tools/ml/prepare_camerash_tile_crops.py"
      - ".github/workflows/train-tiles-tflite.yml"

jobs:
  train:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Prepare Camerash tile crops
        shell: bash
        run: |
          set -euo pipefail
          if [[ -f "third_party/mahjong-dataset/train.zip" ]]; then
            echo "使用子模块内 train.zip"
            python tools/ml/prepare_camerash_tile_crops.py --clear
          else
            echo "子模块内无 train.zip，尝试 --download"
            python tools/ml/prepare_camerash_tile_crops.py --download --clear
          fi

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install "tensorflow-cpu>=2.14,<2.19" "numpy>=1.24"

      - name: Train and export TFLite
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            DATA_DIR="${{ inputs.data_dir }}"
            EPOCHS="${{ inputs.epochs }}"
          else
            DATA_DIR="datasets/tile_crops_camerash_v1"
            EPOCHS="30"
          fi
          if [[ -z "${DATA_DIR// }" ]]; then DATA_DIR="datasets/tile_crops_camerash_v1"; fi
          if [[ -z "${EPOCHS// }" ]]; then EPOCHS="30"; fi

          has_real=0
          if [[ -d "${DATA_DIR}/00" ]] || [[ -d "${DATA_DIR}/0" ]]; then has_real=1; fi

          # 回退：仓库内手工标注集
          if [[ "${has_real}" -eq 0 ]]; then
            if [[ -d "datasets/tile_crops_v1/00" ]] || [[ -d "datasets/tile_crops_v1/0" ]]; then
              DATA_DIR="datasets/tile_crops_v1"
              has_real=1
            fi
          fi

          # 非手动触发：短 epoch 冒烟，避免每次改脚本都长时间占用 runner
          if [[ "${{ github.event_name }}" != "workflow_dispatch" ]]; then
            if [[ "${has_real}" -eq 1 ]]; then EPOCHS=12; else EPOCHS=8; fi
          fi

          if [[ "${has_real}" -eq 1 ]]; then
            echo "使用真实牌面数据: ${DATA_DIR}，epochs=${EPOCHS}"
            python tools/ml/train_tile_classifier_v1.py \
              --data-dir "${DATA_DIR}" \
              --epochs "${EPOCHS}" \
              --batch-size 64
          else
            echo "未找到真实数据目录，使用合成占位数据（epochs=8）"
            python tools/ml/train_tile_classifier_v1.py --epochs 8 --n-per-class 200
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tiles-v1-tflite
          path: app/src/main/assets/ml/xuezhan_mahjong_default/tiles-v1.tflite
